<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Outer ring - UAE green -->
  <circle cx="100" cy="100" r="96" fill="#00732F" stroke="#C4A035" stroke-width="3"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="white" stroke-width="2" opacity="0.5"/>

  <!-- UAE flag accent - red vertical bar -->
  <rect x="28" y="40" width="18" height="120" rx="2" fill="#FF0000"/>

  <!-- White/green flag stripes suggestion -->
  <path d="M46 40 H172 A8 8 0 0 1 180 48 V72 H46 Z" fill="white"/>
  <path d="M46 72 H180 V96 H46 Z" fill="black"/>
  <path d="M46 96 H180 V120 H46 Z" fill="white"/>
  <path d="M46 120 H180 V144 H46 Z" fill="#00732F"/>
  <path d="M46 144 H172 A8 8 0 0 0 180 152 V160 H46 Z" fill="black" opacity="0"/>

  <!-- Inner white circle -->
  <circle cx="100" cy="100" r="52" fill="white" stroke="#0B8F8C" stroke-width="3"/>

  <!-- Pharmacy cross -->
  <rect x="92" y="68" width="16" height="64" rx="3" fill="#0B8F8C"/>
  <rect x="68" y="92" width="64" height="16" rx="3" fill="#0B8F8C"/>

  <!-- UAE text arc area -->
  <text x="100" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#00732F">UAE</text>
  <text x="100" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#555">LICENSED PHARMACY</text>
</svg>
